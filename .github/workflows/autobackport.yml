name: Autobackport

on:
  push:
    branches:
      - main

jobs:
  setup:
    if: ${{ !github.event.repository.fork }}
    runs-on: ubuntu-slim
    outputs:
      has_tags: ${{ steps.dynamic.outputs.has_tags }}
      refs: ${{ steps.dynamic.outputs.refs }}
      has_refs: ${{ steps.dynamic.outputs.has_refs }}
    permissions:
      contents: read
      actions: read
    steps:
      - uses: plengauer/opentelemetry-github/actions/instrument/job@3863925db919310045f636380cc799b60ed41c92
        env:
          OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: http://${{ secrets.PARENT_DOMAIN }}:4318/v1/metrics
          OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: http://${{ secrets.PARENT_DOMAIN }}:4318/v1/logs
          OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://${{ secrets.PARENT_DOMAIN }}:4318/v1/traces
        with:
          secrets_to_redact: ${{ github.token }}
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
      - id: dynamic
        run: |
          [ -z "$(git describe --tags --abbrev=0 ${{ github.sha }})" ] || echo "has_tags=true" >>  "$GITHUB_OUTPUT"
          cat '${{ github.event_path }}' | jq '.commits[].id' -r | while read -r ref; do
            if git tag --points-at "$ref" | grep -qE '^v'; then continue; fi
            echo "$ref"
            echo "has_refs=true" >>  "$GITHUB_OUTPUT"
          done | while read -r ref; do echo \""$ref"\"; done | jq -s | tr -d '\n' | tr -d ' ' | xargs -0 -I {} echo 'refs={}' >> "$GITHUB_OUTPUT"
  backport:
    if: ${{ !github.event.repository.fork && needs.setup.outputs.has_tags && needs.setup.outputs.has_refs }}
    needs: setup
    strategy:
      matrix:
        ref: ${{ fromJSON(needs.setup.outputs.refs) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
      issues: read
      actions: read
    steps:
      - uses: plengauer/opentelemetry-github/actions/instrument/job@3863925db919310045f636380cc799b60ed41c92
        env:
          OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: http://${{ secrets.PARENT_DOMAIN }}:4318/v1/metrics
          OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: http://${{ secrets.PARENT_DOMAIN }}:4318/v1/logs
          OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://${{ secrets.PARENT_DOMAIN }}:4318/v1/traces
        with:
          secrets_to_redact: |-
            ${{ github.token }}
            ${{ secrets.ACTIONS_GITHUB_TOKEN }}
            ${{ secrets.OPENAI_TOKEN }}
      - id: autoversion
        uses: plengauer/autoversion@c52ec7d4869f199d2b1706059fb4f9d15eb672b9 # v3.1.1
        with:
          github_token: ${{ secrets.ACTIONS_GITHUB_TOKEN || github.token }}
          openai_token: ${{ secrets.OPENAI_TOKEN }}
          dry_run: true
          ref: ${{ matrix.ref }}
          increments: 'patch'
          depth: 1
      - id: check_patch
        run: |
          if git diff --quiet; then echo "should_backport=false"; else echo "should_backport=true"; fi >> "$GITHUB_OUTPUT"
          git checkout .
      
      - id: prepare_branch
        if: steps.check_patch.outputs.should_backport == 'true'
        run: "set -e\ncurrent_tag=$(git describe --tags --abbrev=0 ${{ matrix.ref }})\nif [ -z \"${current_tag:-}\" ]; then exit 1; fi\ncurrent_tag_sha=$(git rev-list -n 1 \"$current_tag\")\nwhile read -r tag; do\n  if [ \"${#tag}\" -gt \"${#current_tag}\" ]; then\n    current_tag=\"$tag\"\n  fi\ndone < <(git tag --points-at \"$current_tag_sha\")\ncase \"$current_tag\" in\n  v*.*.*) current_tag=\"${current_tag%.*}\";;\n  v*.*) ;;\n  v*) exit 2;;\n  *) exit 3;; \nesac\nbranch_name=\"release/$current_tag\"\necho name=\"$branch_name\" >> \"$GITHUB_OUTPUT\"\nif git ls-remote --exit-code --heads origin \"$branch_name\"; then\n  git fetch origin \"$branch_name\"\n  git checkout \"$branch_name\"\nelse\n  git checkout -b \"$branch_name\" \"$current_tag\".0\n  git push -u origin \"$branch_name\"\nfi\n"
      - if: steps.check_patch.outputs.should_backport == 'true'
        run: |
          set -e
          git format-patch -1 "${{ matrix.ref }}" --stdout > /tmp/commit.patch
          [ -s /tmp/commit.patch ] || exit 0
          git apply /tmp/commit.patch || git cherry-pick -n "${{ matrix.ref }}"
      
      - id: prepare_pr
        if: steps.check_patch.outputs.should_backport == 'true'
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_GITHUB_TOKEN }}
        run: |
          set -e
          echo commit_title="$(git log -1 --pretty=%s "${{ matrix.ref }}")" >> "$GITHUB_OUTPUT"
          echo author_name="$(git log -1 --pretty=%an "${{ matrix.ref }}" 2>/dev/null || echo "")" >> "$GITHUB_OUTPUT"
          echo author_email="$(git log -1 --pretty=%ae "${{ matrix.ref }}" 2>/dev/null || echo "")" >> "$GITHUB_OUTPUT"
      
      - id: open-pr
        if: steps.check_patch.outputs.should_backport == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.ACTIONS_GITHUB_TOKEN || github.token }}
          commit-message: |
            ${{ steps.prepare_pr.outputs.commit_title }}
            Co-authored-by: ${{ steps.prepare_pr.outputs.author_name }} <${{ steps.prepare_pr.outputs.author_email }}>
          base: ${{ steps.prepare_branch.outputs.name }}
          branch: backport/${{ matrix.ref }}
          title: "${{ steps.prepare_pr.outputs.commit_title }}"
          body: Automated backport of commit ${{ matrix.ref }}
          delete-branch: true
      - run: sleep 60 # let API catch up
        if: steps.open-pr.outputs.pull-request-number != null
      - run: gh pr merge --squash --auto ${{ steps.open-pr.outputs.pull-request-number }}
        if: steps.open-pr.outputs.pull-request-number != null
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_GITHUB_TOKEN || github.token }}
